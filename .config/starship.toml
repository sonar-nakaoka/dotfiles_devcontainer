"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](#4E1F3D)\
$os\
$username\
[](bg:#7B2C4E fg:#4E1F3D)\
$directory\
[](fg:#7B2C4E bg:#D67B96)\
$git_branch\
$git_status\
[](fg:#D67B96 bg:#F0C088)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$maven\
$nodejs\
$bun\
$nim\
$rust\
$scala\
[](fg:#F0C088 bg:#7BC4A8)\
$docker_context\
[](fg:#7BC4A8 bg:#8B9BC7)\
$time\
[ ](fg:#8B9BC7)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:#FFFFFF bg:#4E1F3D"
style_root = "fg:#FFFFFF bg:#4E1F3D"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "fg:#FFFFFF bg:#4E1F3D"
disabled = true # Disabled by default

[directory]
style = "fg:#FFFFFF bg:#7B2C4E"
format = "[ $path ]($style)"
truncation_length = 0
truncation_symbol = "…/"
truncate_to_repo = false

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
# Keep in mind that the order matters. For example:
# "Important Documents" = " 󰈙 "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important 󰈙 " = " 󰈙 "

[c]
symbol = " "
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "fg:#FFFFFF bg:#7BC4A8"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = " "
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "fg:#FFFFFF bg:#D67B96"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:#FFFFFF bg:#D67B96"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[maven]
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[bun]
symbol = ""
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "fg:#FFFFFF bg:#F0C088"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "fg:#FFFFFF bg:#8B9BC7"
format = '[  $time ]($style)'
